name: 'Upstream Sync'
permissions:
  write-all
on:
  schedule:
    - cron:  '0 */12 * * *'    # 每 12 小时同步一次
  workflow_dispatch:      # 允许手动点击按钮触发

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    name: Sync latest commits from upstream repo

    steps:
    # 第一步：检出你的 Fork 仓库
    - name: Checkout target repo
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.SYNCTOKEN }} # 使用你刚才设置的 Secret
    
    # 第二步：运行同步 Action
    - name: Sync upstream changes
      id: sync
      uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.3
      with:
        upstream_sync_repo: ohmyzsh/ohmyzsh      # 【需修改】填入原作者的 仓库路径
        upstream_sync_branch: master                      # 【需修改】原作者的主分支名
        target_sync_branch: master                        # 你的同步分支名
        target_repo_token: ${{ secrets.SYNCTOKEN }}    # 确认 Secret 名称一致
        upstream_repo_access_token: ${{ secrets.SYNCTOKEN }}
        # 策略设置
        test_mode: false # 设为 true 可以测试而不实际推送

    # 恢复自己的 workflow，避免同步 upstream 的 workflow 文件
    - name: Keep local workflows

      run: |

        git checkout origin/master -- .github/workflows || true

        git add .github/workflows

        git commit -m "keep local github workflows" || true

        git push origin master || true
      
    # 第三步：检查同步结果（可选）
    - name: Check for errors
      if: failure()
      run: echo "同步失败，可能存在冲突，请手动处理。"
